<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Clever | Portal</title>

    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/wZKh3RtG/favicon.jpg">

    <base href="https://cdn.jsdelivr.net/gh/Stinkalistic/UGS@main/UNITY/enchain/">

    <style type="text/css">
        /* 1. RESET & THEME */
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            background-color: #000000 !important;
            font-family: Arial, sans-serif;
        }

        /* 2. THE TOP BAR - FORCED PURE WHITE */
        #topbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 60px !important;
            background-color: #ffffff !important; 
            background: #ffffff !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            z-index: 1000000 !important;
            box-sizing: border-box !important;
            border: none !important;
        }

        #topbar img {
            height: 40px !important;
            margin-right: 12px !important;
        }

        #topbar a {
            color: #000000 !important;
            text-decoration: none !important;
            font-size: 20px !important;
            font-weight: 500 !important;
        }

        /* 3. GAME CONTAINER SETUP */
        #game-wrapper {
            position: absolute !important;
            top: 60px !important; /* Below white bar */
            left: 0 !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
            background: #000 !important;
        }

        #gameContainer {
            width: 100% !important;
            height: 100% !important;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>

    <script src="Build/UnityLoader.js"></script>
    <script>
        // Start the game instance
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Enchain WebGL.json");

        // 4. 360-SPIN / POINTER LOCK FIX
        // Clicking the game area locks the mouse for FPS controls
        window.addEventListener('mousedown', function(e) {
            var canvas = document.querySelector('canvas');
            if (canvas && e.target === canvas) {
                canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
                canvas.requestPointerLock();
            }
        });
    </script>
</head>
<body>

    <div id="topbar">
        <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
        <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
    </div>

    <div id="game-wrapper">
        <div id="gameContainer"></div>
    </div>

</body>
</html>
